# Despliegue a GitHub Pages en cada push a main.
# Requiere: Settings → Pages → Source = "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Comprobaciones de fidelidad
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - name: Build + upload
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      # Pages devuelve a veces "Deployment failed, try again later";
      # un segundo intento tras una pausa suele bastar
      - name: Espera antes del reintento
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - name: Reintento del deploy
        id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
